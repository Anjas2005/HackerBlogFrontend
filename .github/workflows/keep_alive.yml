name: Keep Render Apps Awake

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping repeatedly for 5 minutes
        run: |
          for i in {1..10}
          do
            curl -s --max-time 30 https://hackerblogbackend.onrender.com || true
            curl -s --max-time 30 https://hackernewsscraper-7x6b.onrender.com || true
            sleep 30
          done
